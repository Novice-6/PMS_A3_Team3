<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inventory List</ion-title>
    <ion-button slot="end" (click)="showHelp()" fill="clear" color="light">
      ❔ Help
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadAllItems()">
    <ion-refresher-content
      pullingIcon="arrow-down"
      pullingText="Pull to refresh"
      refreshingSpinner="circles"
      refreshingText="Refreshing..."
    ></ion-refresher-content>
  </ion-refresher>

  <ion-searchbar
    [(ngModel)]="searchTerm"
    (ionInput)="searchItem()"
    placeholder="Search item by name"
    class="ion-padding"
  ></ion-searchbar>

  <div *ngIf="displayedItems.length === 0" class="ion-text-center ion-padding">
    <ion-skeleton-text animated style="width: 80%; height: 20px;"></ion-skeleton-text>
    <ion-skeleton-text animated style="width: 60%; height: 16px; margin-top: 10px;"></ion-skeleton-text>
    <ion-skeleton-text animated style="width: 70%; height: 16px; margin-top: 10px;"></ion-skeleton-text>
  </div>

  <ion-card *ngFor="let item of displayedItems" class="ion-margin">
    <ion-card-header [ngClass]="{
      'in-stock': item.stock_status === 'In Stock',
      'low-stock': item.stock_status === 'Low Stock',
      'out-of-stock': item.stock_status === 'Out of Stock'
    }">
      <ion-card-title>{{ item.item_name }}</ion-card-title>
      <ion-card-subtitle>{{ item.category }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <p>Quantity: {{ item.quantity }}</p>
      <p>Price: ${{ item.price }}</p>
      <p>Supplier: {{ item.supplier_name }}</p>
      <p [ngClass]="{
        'in-stock': item.stock_status === 'In Stock',
        'low-stock': item.stock_status === 'Low Stock',
        'out-of-stock': item.stock_status === 'Out of Stock'
      }">Status: {{ item.stock_status }}</p>
      <p *ngIf="item.special_note">Note: {{ item.special_note }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
