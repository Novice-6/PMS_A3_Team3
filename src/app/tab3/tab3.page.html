<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inventory Item Management</ion-title>
    <ion-button slot="end" (click)="showHelp()" fill="clear" color="light">
      ❔Help
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="page-bg">
  <ion-card class="glass-card">
    <ion-card-header class="card-header-custom">
      <ion-card-title class="card-title-custom">
        Search Inventory Item
      </ion-card-title>
    </ion-card-header>
    <ion-card-content class="card-content-custom">
      <ion-input 
        class="input-custom"
        placeholder="Enter item name" 
        #searchInput
        clearInput
      ></ion-input>
      <ion-button 
        expand="block" 
        class="btn-primary"
        (click)="searchItemByName($any(searchInput.value))"
      >
        Search Item
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card class="glass-card" *ngIf="isItemFound">
    <ion-card-header class="card-header-custom">
      <ion-card-title class="card-title-custom">
        Edit Item Details
      </ion-card-title>
    </ion-card-header>
    <ion-card-content class="card-content-custom">
      <form [formGroup]="itemForm">
        <ion-item class="item-custom">
          <ion-label class="label-custom">Item Name (Unique)</ion-label>
          <ion-input formControlName="item_name" [disabled]="true"></ion-input>
        </ion-item>

        <ion-item class="item-custom">
          <ion-label class="label-custom">Category</ion-label>
          <ion-select formControlName="category" interface="popover">
            <ion-select-option value="Electronics">Electronics</ion-select-option>
            <ion-select-option value="Furniture">Furniture</ion-select-option>
            <ion-select-option value="Clothing">Clothing</ion-select-option>
            <ion-select-option value="Tools">Tools</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item class="item-custom">
          <ion-label class="label-custom">Quantity</ion-label>
          <ion-input type="number" formControlName="quantity"></ion-input>
        </ion-item>

        <ion-item class="item-custom">
          <ion-label class="label-custom">Price</ion-label>
          <ion-input type="number" step="0.01" formControlName="price"></ion-input>
        </ion-item>

        <ion-item class="item-custom">
          <ion-label class="label-custom">Supplier Name</ion-label>
          <ion-input formControlName="supplier_name"></ion-input>
        </ion-item>

        <ion-item class="item-custom">
          <ion-label class="label-custom">Stock Status</ion-label>
          <ion-select formControlName="stock_status" interface="popover">
            <ion-select-option value="In Stock">In Stock</ion-select-option>
            <ion-select-option value="Low Stock">Low Stock</ion-select-option>
            <ion-select-option value="Out of Stock">Out of Stock</ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item class="item-custom checkbox-row">
          <ion-checkbox formControlName="featured_item"></ion-checkbox>
          <ion-label class="label-custom">Mark as Featured Item</ion-label>
        </ion-item>

        <ion-item class="item-custom">
          <ion-label class="label-custom">Special Note (Optional)</ion-label>
          <ion-textarea formControlName="special_note" rows="2"></ion-textarea>
        </ion-item>

        <div class="btn-group">
          <ion-button expand="block" color="success" class="btn-success" (click)="updateItem()">
            Save Changes
          </ion-button>
          <ion-button expand="block" color="danger" class="btn-danger" (click)="deleteItem()">
            Delete Item
          </ion-button>
        </div>
      </form>
    </ion-card-content>
  </ion-card>
</ion-content>
